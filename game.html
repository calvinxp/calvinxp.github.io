    <link rel="stylesheet" href="styles/styles.css">
    <meta charset="UTF-8">
  <title>Guessing Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a class="nav-link" href="home.html">home</a>
    <a class="nav-link" href="clock.html">clock</a>
    <a class="nav-active" href="game.html">game</a>
</div> 


  <h1>Guessing Game</h1>
  <p>Guess a number between 1 and 100:</p>
  <input type="number" id="guessInput">
  <button onclick="checkGuess()">Check</button>
  <p id="result"></p>

  <script>
    // Generate a random number between 1 and 100
    const randomNumber = Math.floor(Math.random() * 100) + 1;

    function checkGuess() {
      const guessInput = document.getElementById('guessInput');
      const guess = parseInt(guessInput.value);

      const result = document.getElementById('result');

      if (isNaN(guess) || guess < 1 || guess > 100) {
        result.textContent = 'Please enter a valid number between 1 and 100.';
      } else if (guess === randomNumber) {
        result.textContent = 'Congratulations! You guessed the correct number!';
      } else if (guess < randomNumber) {
        result.textContent = 'Too low! Try a higher number.';
      } else {
        result.textContent = 'Too high! Try a lower number.';
      }

      guessInput.value = '';
      guessInput.focus();
    }
  </script>
</body>
</html>
